<script>
function initCarousel() {
    if (window.innerWidth <= 900) return;
    var wrapper   = document.querySelector('.carousel-wrapper');
    var grid      = document.querySelector('.portfolio-grid');
    var leftZone  = document.querySelector('.carousel-zone--left');
    var rightZone = document.querySelector('.carousel-zone--right');
    if (!wrapper || !grid || !leftZone || !rightZone) return;

    var current = 0;
    var target  = 0;
    var raf     = null;

    grid.style.transform = 'translateX(0px)';

    function maxOffset() {
        return Math.max(0, grid.scrollWidth - wrapper.offsetWidth);
    }

    function animate() {
        current += (target - current) * 0.12;
        grid.style.transform = 'translateX(-' + current + 'px)';
        if (Math.abs(target - current) > 0.3) {
            raf = requestAnimationFrame(animate);
        } else {
            current = target;
            grid.style.transform = 'translateX(-' + current + 'px)';
            raf = null;
        }
    }

    function moveTo(val) {
        target = Math.max(0, Math.min(val, maxOffset()));
        if (!raf) raf = requestAnimationFrame(animate);
    }

    function stepByCard(dir) {
        var card = grid.querySelector('.art-card');
        var w = card ? card.offsetWidth : 400;
        moveTo(target + dir * w);
    }

    var newLeft  = leftZone.cloneNode(true);
    var newRight = rightZone.cloneNode(true);
    leftZone.parentNode.replaceChild(newLeft, leftZone);
    rightZone.parentNode.replaceChild(newRight, rightZone);

    newLeft.addEventListener('click',  function() { stepByCard(-1); });
    newRight.addEventListener('click', function() { stepByCard(1); });
}

document.addEventListener('DOMContentLoaded', initCarousel);
